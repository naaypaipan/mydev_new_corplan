name: Monitoring System Deployment Pipelines

on:
  push:
    branches: [main]

jobs:
  docker-main-app:
    runs-on: ubuntu-latest
    steps:
      - name: Docker Login
        uses: docker/login-action@v3.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker images
        uses: docker/build-push-action@v5.0.0
        with:
          push: true
          tags: paipan/sotus_project:latest
      - name: Build and push Docker images
        uses: docker/build-push-action@v5.0.0
        with:
          push: true
          tags: paipan/sotus_project_notify:latest
          #context: notify
      - name: SSH To Server
        uses: appleboy/ssh-action@v0.1.2
        with:
          host: admin.psttutor.com
          port: 22
          username: root
          password: ${{secrets.SERVER_PASSWORD}}
          script: |-
            cd /home/worker/sotus_project
            docker login -u ${{secrets.DOCKERHUB_USERNAME}} -p ${{secrets.DOCKERHUB_TOKEN}}
            docker-compose pull
            docker-compose up -d
